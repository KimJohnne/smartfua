<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sky:     #0ea5e9;
  --sky-d:   #0284c7;
  --sky-dd:  #0369a1;
  --sky-l:   #38bdf8;
  --sky-xl:  #e0f2fe;
  --sky-xxl: #f0f9ff;
  --white:   #ffffff;
  --ink:     #0c1a2e;
  --ink-2:   #1e3a5f;
  --slate:   #475569;
  --mist:    #94a3b8;
  --border:  rgba(14,165,233,.12);
  --font:    'Plus Jakarta Sans', sans-serif;
  --ease:    cubic-bezier(.4,0,.2,1);
}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--white);color:var(--ink);line-height:1.7;overflow-x:hidden}
::selection{background:var(--sky);color:#fff}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--sky);border-radius:2px}
img{display:block;width:100%;height:100%;object-fit:cover}
.container{max-width:1100px;margin:0 auto;padding:0 36px}
.sp{padding:96px 0}
.fu{opacity:0;transform:translateY(18px);transition:opacity .6s var(--ease),transform .6s var(--ease)}
.fu.vis{opacity:1;transform:translateY(0)}
.fu.d1{transition-delay:.1s}.fu.d2{transition-delay:.2s}.fu.d3{transition-delay:.3s}

.btn-sky{display:inline-flex;align-items:center;gap:8px;background:var(--sky);color:#fff;padding:13px 28px;font-family:var(--font);font-size:13px;font-weight:700;border:none;cursor:pointer;border-radius:50px;transition:background .2s,transform .2s,box-shadow .2s;text-decoration:none;box-shadow:0 4px 16px rgba(14,165,233,.3)}
.btn-sky:hover{background:var(--sky-d);transform:translateY(-2px);box-shadow:0 6px 24px rgba(14,165,233,.4)}
.btn-outline{display:inline-flex;align-items:center;gap:8px;background:transparent;color:var(--sky);border:1.5px solid var(--sky);padding:12px 26px;font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;border-radius:50px;transition:all .2s;text-decoration:none}
.btn-outline:hover{background:var(--sky);color:#fff;box-shadow:0 4px 16px rgba(14,165,233,.3)}
.btn-white{display:inline-flex;align-items:center;gap:8px;background:#fff;color:var(--sky-dd);padding:13px 28px;font-family:var(--font);font-size:13px;font-weight:700;border:none;cursor:pointer;border-radius:50px;transition:background .2s,box-shadow .2s;text-decoration:none;box-shadow:0 4px 16px rgba(0,0,0,.1)}
.btn-white:hover{background:var(--sky-xxl);box-shadow:0 6px 24px rgba(0,0,0,.15)}

.eyebrow{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.ey-dot{width:8px;height:8px;border-radius:50%;background:var(--sky);flex-shrink:0}
.ey-txt{font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--sky)}
.sec-h2{font-size:clamp(32px,4vw,48px);font-weight:800;line-height:1.1;color:var(--ink);margin-bottom:14px;letter-spacing:-.5px}
.sec-h2 span{color:var(--sky)}
.sec-p{color:var(--slate);font-size:15px;font-weight:400;max-width:480px;line-height:1.85}

nav{position:fixed;top:0;left:0;right:0;z-index:300;transition:all .3s;padding:0}
nav.solid{background:rgba(255,255,255,.97);backdrop-filter:blur(16px);box-shadow:0 2px 24px rgba(14,165,233,.08)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:68px}
.nav-logo{cursor:pointer;display:flex;align-items:center;gap:10px;text-decoration:none}
.nl-icon{width:34px;height:34px;background:var(--sky);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.nl-text{display:flex;flex-direction:column}
.nl-main{font-size:17px;font-weight:800;color:var(--white);line-height:1}
nav.solid .nl-main{color:var(--ink)}
.nl-sub{font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.6);margin-top:1px}
nav.solid .nl-sub{color:var(--sky)}
.nav-links{display:flex;align-items:center;list-style:none;gap:0}
.nav-links a{padding:0 16px;height:68px;display:flex;align-items:center;font-size:13px;font-weight:600;color:rgba(255,255,255,.7);text-decoration:none;transition:color .2s;cursor:pointer;border-radius:0}
nav.solid .nav-links a{color:var(--slate)}
.nav-links a:hover{color:var(--sky)}
nav.solid .nav-links a:hover{color:var(--sky)}
.hbg{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none}
.hbg span{display:block;width:22px;height:2px;background:#fff;border-radius:1px}
nav.solid .hbg span{background:var(--ink)}

#app{transition:opacity .2s}
#app.fading{opacity:0}

footer{background:var(--ink);padding:64px 0 0}
.ft-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:40px;padding-bottom:48px}
.ft-logo-name{font-size:20px;font-weight:800;color:#fff}
.ft-logo-tag{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--sky-l);margin-top:4px}
.ft-desc{color:rgba(255,255,255,.4);font-size:13px;line-height:1.8;margin-top:14px;max-width:240px}
.ft-col h4{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--sky-l);margin-bottom:16px;font-weight:700}
.ft-col ul{list-style:none;display:flex;flex-direction:column;gap:10px}
.ft-col a,.ft-col li{color:rgba(255,255,255,.4);font-size:13px;text-decoration:none;cursor:pointer;transition:color .2s}
.ft-col a:hover{color:var(--sky-l)}
.ft-bot{border-top:1px solid rgba(255,255,255,.07);padding:20px 0;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px}
.ft-bot p{color:rgba(255,255,255,.25);font-size:12px}
.ft-credit{color:rgba(14,165,233,.3)!important}

.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.fg label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--slate)}
.fg input,.fg select,.fg textarea{background:var(--sky-xxl);border:1.5px solid var(--border);color:var(--ink);padding:12px 16px;font-family:var(--font);font-size:14px;border-radius:10px;outline:none;transition:border-color .2s,box-shadow .2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--sky);box-shadow:0 0 0 3px rgba(14,165,233,.1)}
.fg textarea{resize:vertical}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:14px}

@media(max-width:1024px){.ft-grid{grid-template-columns:1fr 1fr}}
@media(max-width:768px){
  .nav-links,.nav-bk{display:none}
  .hbg{display:flex}
  nav.open .nav-links{display:flex;flex-direction:column;position:absolute;top:68px;left:0;right:0;background:var(--white);border-bottom:1px solid var(--border);padding:8px 0;gap:0}
  nav.open .nav-links a{height:46px;padding-left:24px;color:var(--slate);border-bottom:1px solid var(--border)}
  .fr2{grid-template-columns:1fr}
  .ft-grid{grid-template-columns:1fr}
}
</style>
</head>

<nav id="nav">

      <li><a onclick="go('services')">Services</a></li>
      <li><a onclick="go('how')">How It Works</a></li>

  </div>
</nav>

<script>
let cur='home';const app=document.getElementById('app');
function go(page){
  if(page===cur&&app.innerHTML){window.scrollTo({top:0,behavior:'smooth'});return}
  app.classList.add('fading');
  setTimeout(()=>{
    cur=page;const tpl=document.getElementById('t-'+page);const ft=document.getElementById('t-footer');
    if(!tpl)return;app.innerHTML=tpl.innerHTML+ft.innerHTML;app.classList.remove('fading');
    window.scrollTo({top:0,behavior:'instant'});updateNav();initPage(page);revealImgs();
  },200);
}
const nav=document.getElementById('nav');
window.addEventListener('scroll',()=>nav.classList.toggle('solid',window.scrollY>50||cur!=='home'));
document.getElementById('hbg').addEventListener('click',()=>nav.classList.toggle('open'));
function updateNav(){
  document.querySelectorAll('.nav-links a').forEach(a=>a.classList.remove('active'));
  const m={home:0,services:1,how:2,contact:3};const links=document.querySelectorAll('.nav-links a');
  if(links[m[cur]])links[m[cur]].classList.add('active');
  if(cur==='home')nav.classList.toggle('solid',window.scrollY>50);else nav.classList.add('solid');
}
function initPage(page){
  setTimeout(()=>{
    const obs=new IntersectionObserver((entries)=>{entries.forEach((e,i)=>{if(e.isIntersecting)setTimeout(()=>e.target.classList.add('vis'),i*80)});},{threshold:.07});
    document.querySelectorAll('.fu').forEach(el=>obs.observe(el));
  },50);
  if(page==='contact'){
    const form=document.getElementById('bkForm');
    if(form)form.addEventListener('submit',function(e){
      e.preventDefault();const btn=this.querySelector('button[type="submit"]');
      btn.textContent='✓ Booked! We\'ll confirm your collection time shortly via WhatsApp.';btn.style.background='#0284c7';btn.disabled=true;
    });
  }
}
function revealImgs(){
  setTimeout(()=>{document.querySelectorAll('img').forEach(img=>{img.style.transition='opacity .4s';if(img.complete)img.style.opacity='1';else{img.style.opacity='0';img.onload=()=>img.style.opacity='1'}});},80);
}
go('home');
</script>
</body>
</html>
